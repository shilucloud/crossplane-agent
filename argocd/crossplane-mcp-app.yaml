apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane-mcp-server
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://shilucloud.github.io/crossplane-mcp-server/
    chart: crossplane-mcp-server
    targetRevision: 0.1.3
    helm:
      values: |
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp-servers
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
