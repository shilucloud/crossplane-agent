apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agentgateway-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/shilucloud/crossplane-agent
    path: agentgateway
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: agentgateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true