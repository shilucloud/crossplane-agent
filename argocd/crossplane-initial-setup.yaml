apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane-initial-setup
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/shilucloud/crossplane-agent
    path: crossplane-resources/initial
    targetRevision: main

  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
