apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: entire-apps
  namespace: argocd

spec:
  project: default
  source:
    repoURL: https://github.com/shilucloud/crossplane-agent
    path: argocd
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: agentgateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true