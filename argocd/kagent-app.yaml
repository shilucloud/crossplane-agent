apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kagent-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/shilucloud/crossplane-agent
    path: multi-agent
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: kagent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true