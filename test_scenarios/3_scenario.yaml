# XRD
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: xbuckets.platform.example.com
spec:
  scope: Namespaced
  group: platform.example.com
  names:
    kind: XBucket
    plural: xbuckets
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - parameters
              properties:
                parameters:
                  type: object
                  required:
                    - region
                  properties:
                    region:
                      type: string
---
# XR with no matching composition
apiVersion: platform.example.com/v1alpha1
kind: XBucket
metadata:
  name: bucketwithnocomposition
  namespace: default
spec:
  crossplane:
    compositionRef:
      name: nonexistent-composition
  parameters:
    region: ap-south-1