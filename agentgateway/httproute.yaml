apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: crossplane-mcp
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  rules:
    - backendRefs:
        - name: crossplane-mcp-backend
          namespace: agentgateway-system
          group: agentgateway.dev
          kind: AgentgatewayBackend
