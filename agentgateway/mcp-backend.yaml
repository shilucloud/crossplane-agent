apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: crossplane-mcp-backend
  namespace: agentgateway-system
spec:
  mcp:
    targets:
      - name: crossplane-mcp
        static:
          host: crossplane-mcp-server.mcp-servers.svc.cluster.local
          port: 8080
          protocol: StreamableHTTP
 