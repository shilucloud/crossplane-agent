# orchestrator — no MCP tools, only routes to sub-agents
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: crossplane-agent
  namespace: kagent
spec:
  description: "Crossplane debugging orchestrator"
  type: Declarative
  declarative:
    runtime: go
    modelConfig: groq-llama
    systemMessage: |
      You are a Crossplane debugging orchestrator.
      
      Route EVERY request to the correct specialist agent.
      Do NOT answer anything yourself.
      Do NOT ask users for clarification.
      Pass the exact user message to the specialist.
      
      Routing:
      - XR broken/not ready/not syncing → diagnose-xr-agent
      - Provider/credentials issue → diagnose-provider-agent  
      - Composition/function issue → diagnose-composition-agent
      - Explain/describe/validate → explain-agent
      - Show graph/tree/list → visualize-agent
      - Reconcile/fix/retry → remediate-agent
    tools:
      - type: Agent
        agent:
          name: diagnose-xr-agent
      - type: Agent
        agent:
          name: diagnose-provider-agent
      - type: Agent
        agent:
          name: diagnose-composition-agent
      - type: Agent
        agent:
          name: explain-agent
      - type: Agent
        agent:
          name: visualize-agent
      - type: Agent
        agent:
          name: remediate-agent