apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: xnetworks.platform.example.com
spec:
  scope: Namespaced
  group: platform.example.com
  names:
    kind: XNetwork
    plural: xnetworks
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - parameters
              properties:
                parameters:
                  type: object
                  required:
                    - region
                  properties:
                    region:
                      type: string
                    cidrBlock:
                      type: string
                      default: "10.0.0.0/16"
                    subnetCidr:
                      type: string
                      default: "10.0.1.0/24"